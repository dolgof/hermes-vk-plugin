# Пример конфигурации плагина VK
# Формат: extra: в PlatformConfig или channels.vk в конфигурации шлюза

# === Одиночный аккаунт ===
vk:
  token: "vk1.a.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  dmPolicy: "open"
  groupPolicy: "open"

