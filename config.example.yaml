# Пример конфигурации плагина VK
# Формат: extra в PlatformConfig (gateway.platforms.vk.extra)
#
# ⚠️  Токены не хранятся в конфиге — только в .env:
#       VK_GROUP_TOKEN — для single-account
#       VK_GROUP_TOKEN_{ID} — для multi-account (ID = имя аккаунта в uppercase)
#       Либо tokenFile — путь к файлу с токеном (Docker secrets)

# === Одиночный аккаунт ===
# vk:
#   dmPolicy: "open"
#   groupPolicy: "open"

# === Multi-account ===
# vk:
#   api_version: "5.199"
#   accounts:
#     default:
#       dmPolicy: "open"
#       groupPolicy: "open"
#       allowFrom: ["*"]
#     support:
#       tokenFile: "/run/secrets/vk-support-token"
#       dmPolicy: "pairing"
#       groupPolicy: "allowlist"
#       groupAllowFrom: ["*"]
#       requireMention: true
#       botName: "Support Bot"

# === Пример с ограничением доступа ===
# vk:
#   dmPolicy: "allowlist"
#   allowFrom:
#     - "12345"
#     - "67890"
#     - "*"
#   groupPolicy: "disabled"
#   requireMention: true
#   botName: "AI Assistant"
